substitutions:
  # Этапы работы голосового помощника
  # Голосовой помощник готов к активации с помощью слова-активатора
  voice_assist_idle_phase_id: '1'
  # Голосовой помощник ожидает голосовую команду (после активации с помощью слова-активатора)
  voice_assist_waiting_for_command_phase_id: '2'
  # Голосовой помощник ожидает голосовую команду
  voice_assist_listening_for_command_phase_id: '3'
  # Голосовой помощник в данный момент обрабатывает команду
  voice_assist_thinking_phase_id: '4'
  # Голосовой помощник отвечает на команду
  voice_assist_replying_phase_id: '5'
  # Голосовой помощник еще не готов
  voice_assist_not_ready_phase_id: '10'
  # В голосовом помощнике произошла ошибка
  voice_assist_error_phase_id: '11'
  # Установите для этого параметра значение «true», если у вас дома используется скрытый SSID.
  hidden_ssid: "false"
  # Замена аудиофайлов
  mute_switch_on_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  timer_finished_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  wake_word_triggered_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
  center_button_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
  center_button_double_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
  center_button_triple_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
  center_button_long_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
  factory_reset_confirmed_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_confirmed.mp3
  error_cloud_expired_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3


esphome:
  name: koala-moy
  friendly_name: "koala moy 3.0"
  project: 
    name: formatbce.Koala Satellite
    version: 2026.3.0
  name_add_mac_suffix: true
  min_version: 2026.3.0
  on_boot:
    - priority: 375
      then:
        - sensor.template.publish:
            id: next_timer
            state: -1
        # Запустите скрипт, чтобы обновить состояние светодиодов
        - script.execute: control_leds
        # Если по истечении 10 минут устройство все еще находится в процессе инициализации (оно еще не подключилось к Home Assistant), отключите переменную init_in_progress и запустите скрипт для обновления состояния светодиода
        - delay: 10min
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: control_leds
    - priority: -100
      then:
        - lambda: |-
            auto call = id(alarm_action).make_call();
            call.set_option(id(saved_alarm_action));
            call.perform();
        - lambda: |-
            setenv("TZ", id(saved_time_zone).c_str(), 1);
            tzset();
  on_shutdown:
    then:
      # Предотвращение громкого звукового сигнала при перезапуске программы
      - lambda: id(respeaker).mute_speaker();

esp32:
  board: seeed_xiao_esp32s3
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # При загрузке переносит инструкции и данные, доступные только для чтения, из флэш-памяти в PSRAM.
      # Если оба параметра включены, инструкции могут выполняться во время работы с флэш-памятью без необходимости их размещения в IRAM.
      # Значительно ускоряет работу mWW за счёт увеличения объёма используемой PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # В IDF 5.1.5 поддержка TLS 1.3 по умолчанию не включена

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false  # У VPE есть PSRAM, поэтому это безопасно. Позволяет настроить драйвер Wi-Fi на использование большего количества ресурсов (это делается автоматически медиаплеером динамика)

globals:
  # Глобальный индекс для наших светодиодов. Чтобы переключение между различными анимациями не приводило к нежелательным эффектам.
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  # Глобальная переменная инициализации. Инициализируется значением true и устанавливается в false после подключения всех компонентов. Используется исключительно для обеспечения плавного «подключения»
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  # Глобальная переменная, хранящая состояние ImprovBLE. Используется для отображения различных анимаций светодиодов
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  # Глобальная переменная, отслеживающая фазу работы голосового помощника (определена выше). Инициализирована в значение not_ready
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  # Отслеживание глобальной переменной, указывающей, касались ли циферблата в последнее время.
  - id: dial_touched
    type: bool
    restore_value: no
    initial_value: 'false'
  # Отслеживание глобальной переменной, если цвет светодиода был недавно изменен.
  - id: color_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  # Отслеживание глобальной переменной, если громкость группового медиаплеера была недавно изменена.
  - id: group_volume_changed
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: saved_time_zone
    type: std::string
    restore_value: yes
    initial_value: '"UTC0"'
  - id: saved_alarm_action
    type: std::string
    restore_value: yes
    initial_value: '"Play sound"'
  # Глобальная переменная, в которой хранится первый активный таймер
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: no
  # Глобальная переменная, хранящая информацию о том, активен ли таймер
  - id: is_timer_active
    type: bool
    restore_value: no
  # Глобальная переменная, хранящая информацию о том, был ли запрошен сброс к заводским настройкам. Если для нее установлено значение true, устройство выполнит сброс к заводским настройкам после отпускания центральной кнопки
  - id: factory_reset_requested
    type: bool
    restore_value: no
    initial_value: 'false'

# Синхронизация времени с Home Assistant
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      # Every 1 minute
      - seconds: 0
        then:
          - script.execute: check_alarm
    on_time_sync:
      - script.execute: publish_current_time

datetime:
  # Настроить время будильника через Home Assistant
  - platform: template
    icon: mdi:bell-ring
    name: "Alarm time"
    id: alarm_time
    type: time
    initial_value: "00:00:00"
    restore_value: true
    optimistic: true
    internal: false
    set_action:
      then:
        - switch.turn_on: alarm_on
          

switch:
  # Отключение звука аппаратного динамика
  - platform: template
    id: speaker_mute_switch
    name: Speaker mute
    icon: mdi:volume-mute
    internal: true
    optimistic: true
    turn_on_action:
      - lambda: id(respeaker).mute_speaker();
    turn_off_action:
      - lambda: id(respeaker).unmute_speaker();
  # Беспрофильный переключатель для временного отключения микрофона
  - platform: gpio
    internal: true
    pin: 
      number: GPIO4 # D3
      inverted: true
    id: mute_toggle
    on_turn_on:
      - delay: 300ms
      - switch.turn_off: mute_toggle
  # Переключатель отключения микрофона с сохранением состояния для пользователя
  - platform: template
    id: mic_mute_switch
    name: Mic mute
    icon: mdi:microphone-off
    optimistic: false
    lambda: |-
      if (id(mute_state).state) {
        return true;
      } else {
        return false;
      }
    on_turn_on:
      - if:
          condition:
            and:
              - lambda: return !id(init_in_progress);
              - switch.is_on: mute_sound
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: "mute_switch_on_sound"
    on_turn_off:
      - if:
          condition:
            and:
              - lambda: return !id(init_in_progress);
              - switch.is_on: mute_sound
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: "mute_switch_off_sound"
    turn_on_action:
      - if:
          condition:
            lambda: return !id(mute_state).state;
          then:
            - switch.turn_on: mute_toggle
    turn_off_action:
      - if:
          condition:
            lambda: return id(mute_state).state;
          then:
            - switch.turn_on: mute_toggle
  # Переключение звуков при нажатии кнопки.
  - platform: template
    id: button_sound
    name: Button click sounds
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Переключатель отключения звука.
  - platform: template
    id: mute_sound
    name: Mute-unmute sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Переключение звука активирующего слова.
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  # Внутренний переключатель для отслеживания момента срабатывания таймера на устройстве.
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      # Отключить слово пробуждения
      - micro_wake_word.disable_model: stop
      - script.execute: disable_repeat
      # Прервать текущее объявление (например: остановить звуковой сигнал таймера во время воспроизведения)
      - if:
          condition:
            media_player.is_announcing:
              id: external_media_player
          then:
            media_player.stop:
              announcement: true
              id: external_media_player
      # Установить коэффициент отклонения на нос на ноль
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      # Обновить светодиодное кольцо
      - script.execute: control_leds
    on_turn_on:
      # Аудио с уткой
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
      # Включить слово для выхода из режима ожидания
      - micro_wake_word.enable_model: stop
      # Ring timer
      - script.execute: ring_timer
      # Светодиод обновления
      - script.execute: control_leds
      # Если прошло 15 минут, а таймер всё ещё звучит, остановите его.
      - delay: 15min
      - switch.turn_off: timer_ringing
  # Определяет, включена ли сигнализация
  - platform: template
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: alarm_on
    icon: mdi:bell-badge
    name: "Alarm on"
    on_turn_on: 
      then:
        - light.turn_on:
            brightness: 30%
            red: 0%
            green: 100%
            blue: 0%
            id: led_respeaker_onboard
            effect: "None"
    on_turn_off:
      then:
        - light.turn_off: led_respeaker_onboard

binary_sensor:
  # Кнопка пользователя. Используется для различных целей (см. on_multi_click)
  - platform: gpio
    id: user_button
    pin:
      number: GPIO42
      inverted: true
    name: "User button"
    on_press:
      - script.execute: control_leds
    on_release:
      - script.execute: control_leds
      # Если запрашивается сброс к заводским настройкам, выполнить сброс к заводским настройкам при выпуске
      - if:
          condition:
            lambda: return id(factory_reset_requested);
          then:
            - button.press: factory_reset_button
    on_multi_click:
      # Simple Click:
      #   - Abort "things" in order
      #     - Timer
      #     - Announcements
      #     - Voice Assistant Pipeline run
      #     - Music
      #   - Starts the voice assistant if it is not yet running and if the device is not muted. # Запускает голосовой помощник, если он ещё не запущен и если на устройстве не включен режим без звука.
      - timing:
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - if:
                    condition:
                      switch.is_on: timer_ringing
                    then:
                      - switch.turn_off: timer_ringing
                    else:
                      - if:
                          condition:
                            voice_assistant.is_running:
                          then:
                            - voice_assistant.stop:
                          else:
                            - if:
                                condition:
                                  media_player.is_announcing:
                                    id: external_media_player
                                then:
                                  media_player.stop:
                                    announcement: true
                                    id: external_media_player
                                else:
                                  - if:
                                      condition:
                                        media_player.is_playing:
                                          id: external_media_player
                                      then:
                                        - media_player.pause:
                                            id: external_media_player
                                      else:
                                        - if:
                                            condition:
                                              and:
                                                - switch.is_off: mic_mute_switch
                                                - not: voice_assistant.is_running
                                            then:
                                              - if:
                                                  condition:
                                                    switch.is_on: button_sound
                                                  then:
                                                    - script.execute:
                                                        id: play_sound
                                                        priority: true
                                                        sound_file: "center_button_press_sound"
                                                    - delay: 300ms
                                              - voice_assistant.start:
      # Double Click
      #  . Отображается как объект события. Предназначено для использования в автоматизациях в Home Assistant
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - script.execute:
                          id: play_sound
                          priority: false
                          sound_file: "center_button_double_press_sound"
                - event.trigger:
                    id: button_press_event
                    event_type: "double_press"
      # Triple Click
      #  . Отображается как объект события. Предназначено для использования в автоматизациях в Home Assistant
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - script.execute:
                          id: play_sound
                          priority: false
                          sound_file: "center_button_triple_press_sound"
                - event.trigger:
                    id: button_press_event
                    event_type: "triple_press"
      # Long Press
      #  . Отображается как объект события. Предназначено для использования в автоматизациях в Home Assistant
      - timing:
          - ON for at least 1s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(color_changed) && !id(group_volume_changed);
              then:
                - if:
                    condition:
                      switch.is_on: button_sound
                    then:
                      - script.execute:
                          id: play_sound
                          priority: false
                          sound_file: "center_button_long_press_sound"
                - light.turn_off: voice_assistant_leds
                - event.trigger:
                    id: button_press_event
                    event_type: "long_press"
      # Factory Reset Warning  Предупреждение о сбросе настроек до заводских
      #  . Audible and Visible warning. Звуковое и визуальное предупреждение.
      - timing:
          - ON for at least 10s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Factory Reset Coming Up"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_initiated_sound"
                - wait_until:
                    binary_sensor.is_off: user_button
                - if:
                    condition:
                      lambda: return !id(factory_reset_requested);
                    then:
                      - light.turn_off: voice_assistant_leds
                      - script.execute:
                          id: play_sound
                          priority: true
                          sound_file: "factory_reset_cancelled_sound"
      # Factory Reset Confirmed. Сброс к заводским настройкам подтвержден.
      #  . Звуковой сигнал, предлагающий пользователю отпустить кнопку
      #  . Установить значение factory_reset_requested равным true
      - timing:
          - ON for at least 22s
        then:
          - if:
              condition:
                lambda: return !id(dial_touched);
              then:
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: "factory_reset_confirmed_sound"
                - light.turn_on:
                    brightness: 100%
                    red: 100%
                    green: 0%
                    blue: 0%
                    id: voice_assistant_leds
                    effect: "none"
                - lambda: id(factory_reset_requested) = true;

  - platform: gpio
  # Эта штука работает довольно нестабильно, выдавая сразу несколько команд включения/выключения. Не используйте её для важных задач
    id: rotary_button
    disabled_by_default: true
    pin:
      number: GPIO20
      inverted: true
      mode:
        input: true
        pullup: true

light:
  # Аппаратное светодиодное кольцо. Не используется, так как требуется перенастройка
  - platform: esp32_rmt_led_strip
    id: leds_internal
    pin: GPIO13
    chipset: WS2812
    max_refresh_rate: 15ms
    num_leds: 43
    rgb_order: GRB
    rmt_symbols: 96
    default_transition_length: 0ms
    color_correct: [70%, 70%, 70%]

  # Светодиодное кольцо голосового помощника. Переназначение внутреннего светодиода.
  # Этот индикатор не доступен для управления. Он управляется устройством
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: leds_internal
        from: 0
        to: 31
        reversed: True
      - id: leds_internal
        from: 32
        to: 42
        reversed: True
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 60ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (((43 - id(global_led_animation_index) + i) % 43) * step);
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 43;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 30ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (((43 - id(global_led_animation_index) + i) % 43) * step);
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 43;
      - addressable_lambda:
          name: "Thinking"
          update_interval: 30ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 30ms
          lambda: |-
            id(global_led_animation_index) = (43 + id(global_led_animation_index) - 1) % 43;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255, light_color.get_blue() * 255);
            int step = 255/43;
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * (255 - (((43 - id(global_led_animation_index) + i) % 43) * step));
            }
      - addressable_lambda:
          name: "Respeaker startup failed"
          lambda: |-
            Color fail_color(255, 0, 0);
            for (uint8_t i = 0; i < 43; i++) {
              if (i % 3) {
                it[i] = Color::BLACK;
              } else {
                it[i] = fail_color;
              }
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            Color color(255, 0, 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = id(external_media_player).volume * 10.0f;
            auto is_muted = id(external_media_player).is_muted() || id(external_media_player).volume == 0.0f;
            for (uint8_t i = 0; i < 43; i++) {
              if (i <= volume_ratio && !is_muted) {
                it[i] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (is_muted) {
              it[5] = silenced_color;
            }
      - addressable_lambda:
          name: "Center Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_rainbow:
          name: "Rainbow"
          width: 43
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (uint8_t i = 0; i < 43; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            auto timer_ratio = 43.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (uint8_t i = 0; i < 43; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 43 && i != last_led_on ) ? 0.96f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (43 + id(global_led_animation_index) - 1) % 43;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 1s
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (uint8_t i = 0; i < 43; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 43;
  # Светодиодное кольцо, доступное пользователю. Переназначение внутренних светодиодов.
  # Доступно для использования пользователем.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:circle-outline"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: leds_internal
        from: 0
        to: 31
        reversed: True
      - id: leds_internal
        from: 32
        to: 42
        reversed: True
    effects:
      - addressable_rainbow:
          name: "Rainbow"
          width: 43

  - platform: esp32_rmt_led_strip
    id: led_respeaker_onboard
    name: LED Respeaker onboard
    disabled_by_default: true
    internal: false
    rgb_order: GRB
    pin: GPIO1
    num_leds: 1
    rmt_symbols: 48
    chipset: ws2812
    entity_category: config
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Slow Pulse"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 50%
          max_brightness: 100%
  - platform: esp32_rmt_led_strip
    id: led_esp_onboard
    name: LED ESP onboard
    disabled_by_default: true
    internal: false
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    rmt_symbols: 48
    chipset: ws2812
    entity_category: config
    default_transition_length: 0s

sensor:
  # Регулятор. Служит для регулировки громкости и оттенка светодиодного кольца.
  - platform: rotary_encoder
    id: dial
    pin_a: GPIO47
    pin_b: GPIO21
    resolution: 1
    on_clockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: user_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: true
          else:
            - if:
                condition:
                  media_player.is_playing:
                    id: sendspin_group_media_player
                then:
                  - script.execute:
                      id: control_group_volume
                      increase_volume: true
                else:
                  - script.execute:
                      id: control_hue
                      increase_hue: true
    on_anticlockwise:
      - lambda: id(dial_touched) = true;
      - if:
          condition:
            binary_sensor.is_off: user_button
          then:
            - script.execute:
                id: control_volume
                increase_volume: false
          else:
            - if:
                condition:
                  media_player.is_playing:
                    id: sendspin_group_media_player
                then:
                  - script.execute:
                      id: control_group_volume
                      increase_volume: false
                else:
                  - script.execute:
                      id: control_hue
                      increase_hue: false
  - platform: template
    id: next_timer
    name: "Next timer"
    update_interval: never
    disabled_by_default: true
    device_class: duration
    unit_of_measurement: s
    icon: "mdi:timer"

text_sensor:
  - platform: template
    id: next_timer_name
    name: "Next timer name"
    icon: "mdi:timer"
    disabled_by_default: true
  - platform: template
    name: "Current device time"
    id: current_time
    icon: mdi:clock

event:
  # Элемент события, доступный пользователю для автоматизации действий при нажатии центральной кнопки.
  # Простое нажатие не доступно, так как используется для управления самим устройством.
  - platform: template
    id: button_press_event
    name: "Button press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - double_press
      - triple_press
      - long_press

script:
  # Главный скрипт, управляющий светодиодами в зависимости от различных состояний: инициализация, подключение к Wi-Fi и API, а также работа голосового помощника.
  # Для упрощения и обеспечения возможности повторного использования данный скрипт вызывает дочерние скрипты, определенные ниже.
  # Этот скрипт будет запускаться при каждом изменении одного из указанных состояний.
  - id: control_leds
    then:
      - lambda: |
          if (id(respeaker).is_failed()) {
            id(control_leds_respeaker_startup_failed).execute();
            return;
          }
          id(check_if_timers_active).execute();
          if (id(is_timer_active)){
            id(fetch_first_active_timer).execute();
          }
          if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(user_button).state) {
            id(control_leds_center_button_touched).execute();
          } else if (id(dial_touched)) {
            id(control_leds_volume_changed).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  # Скрипт, запускаемый при сбое запуска respeaker\
  # Статический красный цвет с чёрным
  - id: control_leds_respeaker_startup_failed
    then:
      - light.turn_on:
          brightness: 40%
          red: 0%
          green: 0%
          blue: 0%
          id: voice_assistant_leds
          effect: "Respeaker startup failed"

  # Скрипт, запускаемый во время Improv BLE
  # Мягкий белый мерцающий свет
  - id: control_leds_improv_ble_state
    then:
      - light.turn_on:
          brightness: 50%
          red: 100%
          green: 89%
          blue: 71%
          id: voice_assistant_leds
          effect: "Twinkle"

  # Скрипт, запускаемый при инициализации\
  # Мигание синим светом при подключении к Wi-Fi, в противном случае — радужным светом
  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                brightness: 50%
                red: 9%
                green: 73%
                blue: 95%
                id: voice_assistant_leds
                effect: "Twinkle"
          else:
            - light.turn_on:
                id: voice_assistant_leds
                effect: "Rainbow"

  # Скрипт, запускаемый при отсутствии подключения устройства к Home Assistant
  # Мигание красным светом (это будет видно, например, во время обновлений HA)
  - id: control_leds_no_ha_connection_state
    then:
      - light.turn_on:
          brightness: 50%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Скрипт, запускаемый, когда голосовой помощник находится в режиме ожидания (ожидает слова-активатора)
  # Ничего (либо светодиодное кольцо выключено, либо включено, если пользователь решил включить светодиодное кольцо, обращенное к себе)
  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: voice_assistant_leds
      - if:
          condition:
            light.is_on: led_ring
          then:
            light.turn_on: led_ring

  # Скрипт, запускаемый, когда голосовой помощник ожидает команды (после слова-активатора)
  # Медленное вращение светодиодного кольца по часовой стрелке.
  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Waiting for Command"

  # Скрипт, запускаемый при приеме голосового помощником команды
  # Быстрое вращение светодиодного кольца по часовой стрелке.
  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Listening For Command"

  # Скрипт, выполняемый, когда голосовой помощник обрабатывает команду
  # Вращение останавливается, а 2 светодиода, которые в данный момент горят и мигают, сигнализируют об обработке команды.
  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Thinking"

  # Скрипт, запускаемый при ответе голосового помощника на команду
  # Быстрое вращение светодиодного кольца против часовой стрелки.
  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Replying"

  # Скрипт, запускаемый при сбое голосового помощника
  # Быстрый красный импульс
  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Error"

  # Скрипт, запускаемый, когда голосовой помощник не готов
  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Скрипт, запускаемый при изменении громкости\
  # Включается несколько светодиодов, отображающих визуальную индикацию громкости медиаплеера.
  - id: control_leds_volume_changed
    mode: restart
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Volume Display"
      - delay: 2s
      - script.execute: control_leds

  # Скрипт, запускаемый при нажатии центральной кнопки
  # Загорается все светодиодное кольцо
  - id: control_leds_center_button_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Center Button Touched"

  # Скрипт, запускаемый при срабатывании таймера, для управления светодиодами
  # Светодиодное кольцо мигает.
  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer Ring"

  # Скрипт, запускаемый при отсчете таймера, для управления светодиодами
  # Светодиоды отображают оставшееся время в виде доли полного круга.
  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Timer tick"

  # Скрипт, запускаемый при увеличении/уменьшении громкости с помощью регулятора
  - id: control_volume
    mode: restart
    parameters:
      increase_volume: bool  # «Включить»: увеличить громкость / «Выключить»: уменьшить громкость.
    then:
      - delay: 16ms
      - if:
          condition:
            lambda: return increase_volume;
          then:
            - media_player.volume_up:
                id: external_media_player
          else:
            - media_player.volume_down:
                id: external_media_player
      - script.execute: control_leds
      - delay: 1s
      - lambda: id(dial_touched) = false;
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds

  # Скрипт, запускаемый при увеличении/уменьшении громкости с помощью регулятора на групповом медиаплеере
  - id: control_group_volume
    mode: restart
    parameters:
      increase_volume: bool  # «Включить»: увеличить громкость / «Выключить»: уменьшить громкость.
    then:
      - delay: 16ms
      - if:
          condition:
            lambda: return increase_volume;
          then:
            - lambda: id(group_volume_changed) = true;
            - media_player.volume_up:
                id: sendspin_group_media_player
          else:
            - lambda: id(group_volume_changed) = true;
            - media_player.volume_down:
                id: sendspin_group_media_player
      - script.execute: control_leds
      - delay: 1s
      - lambda: id(dial_touched) = false;
      - lambda: id(group_volume_changed) = false;
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds

  # Скрипт, запускаемый при увеличении/уменьшении оттенка с помощью регулятора
  - id: control_hue
    mode: restart
    parameters:
      increase_hue: bool  # Истина: увеличить оттенок / Ложь: уменьшить оттенок.
    then:
      - delay: 16ms
      - if:
          condition:
            lambda: return(abs(int(id(dial).state)) > 3 || id(color_changed));
          then:
            - lambda: |
                id(color_changed) = true;
                auto light_color = id(voice_assistant_leds).current_values;
                int hue = 0;
                float saturation = 0;
                float value = 0;
                rgb_to_hsv( light_color.get_red(),
                            light_color.get_green(),
                            light_color.get_blue(),
                            hue,
                            saturation,
                            value);
                if (increase_hue) {
                  hue = (hue + 10) % 360;
                } else {
                  hue = (hue + 350) % 360;
                }
                if (saturation < 0.05) {
                  saturation = 1;
                }
                float red = 0;
                float green = 0;
                float blue = 0;
                hsv_to_rgb( hue,
                            saturation,
                            value,
                            red,
                            green,
                            blue);
                id(voice_assistant_leds).make_call().set_rgb(red, green, blue).perform();
      - script.execute: control_leds
      - wait_until:
          binary_sensor.is_off: user_button
      - lambda: |
          id(dial_touched) = false;
          // now we "save" the new LED color/state to led_ring, maintaining its brightness and state
          auto led_ring_call = id(led_ring).make_call();
          auto va_leds_cv = id(voice_assistant_leds).current_values;
          led_ring_call.from_light_color_values(va_leds_cv);
          led_ring_call.set_brightness(id(led_ring).current_values.get_brightness());
          led_ring_call.set_state(id(led_ring).current_values.is_on());
          led_ring_call.perform();
      - sensor.rotary_encoder.set_value:
          id: dial
          value: 0
      - script.execute: control_leds
      - delay: 500ms
      - lambda: id(color_changed) = false;

  # Скрипт, запускаемый при срабатывании таймера для воспроизведения звуков.
  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: "timer_finished_sound"

  # Скрипт, запускаемый при звуковом сигнале таймера, для повторного воспроизведения звука завершения таймера.
  - id: enable_repeat_one
    then:
      # Включить режим повтора и делать паузу продолжительностью 500 мс между треками в плейлисте/повторами
      - media_player.repeat_one:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 500ms

  # Скрипт запускается по окончании звукового сигнала таймера, чтобы отключить режим повторения.
  - id: disable_repeat
    then:
      # Отключить режим повтора и установить паузу продолжительностью 0 мс между элементами плейлиста/повторами
      - media_player.repeat_off:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 0ms

  # Скрипт, выполняемый при необходимости воспроизведения звуков на устройстве.
  - id: play_sound
    parameters:
      priority: bool
      # sound_file: "audio::AudioFile*"
      sound_file: string
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - lambda: |-
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }

  # Скрипт, используемый для получения первого активного таймера (сохраняется в глобальной переменной `first_active_timer`)
  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(first_active_timer) = output_timer;

  # Скрипт, используемый для проверки, активен ли таймер (результат сохраняется в глобальной переменной `is_timer_active`)
  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) {
              output = true;
            }
          }
          id(is_timer_active) = output;

  # Скрипт, используемый для активации стоп-слова, если этап TTS длится долго.
  # Почему это реализовано в виде скрипта?
  #   Потому что мы хотим остановить последовательность, если этап TTS завершится раньше.
  #   Это позволяет нам избежать деактивации стоп-слова до его собственной активации.
  - id: activate_stop_word_once
    then:
      - wait_until:
          condition:
            media_player.is_announcing:
              id: external_media_player
      - delay: 1s
      # Enable stop wake word Включить слово пробуждения
      - if:
          condition:
            switch.is_off: timer_ringing
          then:
            - micro_wake_word.enable_model: stop
            - wait_until:
                not:
                  media_player.is_announcing:
                    id: external_media_player
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop

  - id: check_alarm
    then:
      - lambda: |-
          id(publish_current_time).execute();
          // Check alarm
          if (id(alarm_on).state) {
            auto alarm_dt = id(alarm_time).state_as_esptime();
            auto time_now = id(homeassistant_time).now();

            if (time_now.hour == alarm_dt.hour && time_now.minute == alarm_dt.minute) {
              auto action = id(alarm_action).current_option();
              if (action == "Play sound") {
                id(timer_ringing).turn_on();
              } else if (action == "Send event") {
                id(send_alarm_event).execute();
              } else if (action == "Sound and event") {
                id(timer_ringing).turn_on();
                id(send_alarm_event).execute();
              }
            }
          }

  - id: send_wake_word_event
    parameters:
      wake_word: string
    then:
      - homeassistant.event:
          event: esphome.wake_word_detected
          data:
            wake_word: !lambda return wake_word;
  - id: send_alarm_event
    then:
      - homeassistant.event:
          event: esphome.alarm_ringing
  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            uri: !lambda return tts_uri;
  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - homeassistant.event:
          event: esphome.stt_text
          data:
            text: !lambda return stt_text;
  - id: publish_current_time
    then:
      - lambda: |-
          // Publish current time
          auto time_now = id(homeassistant_time).now();
          id(current_time).publish_state(time_now.strftime("%H:%M"));

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: 
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:  
      number: GPIO8
      allow_other_uses: true
    i2s_mclk_pin:  
      number: GPIO9
      allow_other_uses: true

  - id: i2s_input
    i2s_lrclk_pin:  
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:  
      number: GPIO8
      allow_other_uses: true
    i2s_mclk_pin:  
      number: GPIO9
      allow_other_uses: true

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO44
    adc_type: external
    pdm: false
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo
      
speaker:
  # Выход на внешний динамик
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO43
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: aic3204_dac

  # Виртуальные динамики, объединяющие звук объявления и медиапотоки в один выходной сигнал
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  # Виртуальные динамики должны при необходимости передискретизировать аудиосигнал каждого конвейера, поскольку динамик микшера требует одинаковой частоты дискретизации
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

http_request:
# Удалите этот комментарий, если у вас возникли проблемы с функцией преобразования текста в речь из-за использования внутренних URL-адресов Home Assistant по протоколу HTTPS
#   verify_ssl: false
  buffer_size_rx: 2048  # Reduces CPU load when streaming audio

audio_file:
  - id: center_button_press_sound
    file: ${center_button_press_sound_file}
  - id: center_button_double_press_sound
    file: ${center_button_double_press_sound_file}
  - id: center_button_triple_press_sound
    file: ${center_button_triple_press_sound_file}
  - id: center_button_long_press_sound
    file: ${center_button_long_press_sound_file}
  - id: factory_reset_initiated_sound
    file: ${factory_reset_initiated_sound_file}
  - id: factory_reset_cancelled_sound
    file: ${factory_reset_cancelled_sound_file}
  - id: factory_reset_confirmed_sound
    file: ${factory_reset_confirmed_sound_file}
  - id: mute_switch_on_sound
    file: ${mute_switch_on_sound_file}
  - id: mute_switch_off_sound
    file: ${mute_switch_off_sound_file}
  - id: timer_finished_sound
    file: ${timer_finished_sound_file}
  - id: wake_word_triggered_sound
    file: ${wake_word_triggered_sound_file}
  - id: error_cloud_expired
    file: ${error_cloud_expired_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: http_request
    id: http_announcement_source
    buffer_size: 250000
  - platform: http_request
    id: http_media_source
    buffer_size: 500000
  - platform: sendspin
    id: sendspin_media_source
    fixed_delay: 480 microseconds  # ЦАП AIC3204, используемый в данной конфигурации на платформе VPE, вносит задержку в аудиосигнал, равную 480 микросекундам

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
  - platform: speaker_source
    id: external_media_player
    name: Media Player
    announcement_pipeline:
      format: FLAC     # FLAC — это кодек, требующий наименьших ресурсов процессора
      num_channels: 1  # Для объявлений стереозвук не требуется
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source
    media_pipeline:
      format: FLAC     # FLAC — это кодек, требующий наименьших ресурсов процессора
      num_channels: 2
      sample_rate: 48000
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.4
    volume_max: 0.85
    on_mute:
      - script.execute: control_leds_volume_changed
    on_unmute:
      - script.execute: control_leds_volume_changed
    on_volume:
      - script.execute: control_leds_volume_changed
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - switch.is_off: timer_ringing
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing: external_media_player
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s

respeaker_lite:
  id: respeaker
  reset_pin: GPIO2
  mute_state:
    internal: true
    id: mute_state
  firmware_version:
    icon: mdi:application-cog
    name: XMOS firmware version
    internal: false
    id: firmware_version
  firmware:
    url: https://github.com/formatBCE/Respeaker-Lite-ESPHome-integration/raw/refs/heads/main/respeaker_lite_i2s_dfu_firmware_48k_v1.1.0.bin
    version: "1.1.0"
    md5: 9297155d1bf3eb21a9d4db52a89ea0c6
    on_begin:
      - light.turn_on:
          brightness: 50%
          red: 50%
          green: 50%
          blue: 50%
          id: led_respeaker_onboard
          effect: "Slow Pulse"
    on_end:
      - light.turn_on:
          brightness: 50%
          red: 0%
          green: 100%
          blue: 0%
          id: led_respeaker_onboard
          effect: "Fast Pulse"
      - delay: 3s
      - light.turn_off:
          id: led_respeaker_onboard
    on_error:
      - light.turn_on:
          brightness: 50%
          red: 100%
          green: 0%
          blue: 0%
          id: led_respeaker_onboard
          effect: "Fast Pulse"
      - delay: 3s
      - light.turn_off:
          id: led_respeaker_onboard

external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
    refresh: 0s
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-Lite-ESPHome-integration
      ref: main
    components: 
      - respeaker_lite
    refresh: 0s
  - source:
      # https://github.com/esphome/esphome/pull/14933
      type: git
      url: https://github.com/kahrendt/esphome
      ref: 890e33f99af2c2ea15dc74c3ec4cf32d25203526
    components: [const, media_source, sendspin]
  - source:
      # https://github.com/esphome/esphome/pull/12429
      type: git
      url: https://github.com/esphome/esphome
      ref: ff8ce89556748509d7ee8724e12d9d43d3c8c1e8
    refresh: 0s
    components: [http_request]

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 1
    gain_factor: 4
  stop_after_detection: false
  models:
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      # probability_cutoff: 0.8
      id: okay_nabu
    - model: https://raw.githubusercontent.com/formatBCE/Respeaker-Lite-ESPHome-integration/refs/heads/main/microwakeword/models/v2/kenobi.json
      id: kenobi
    - model: hey_jarvis
      id: hey_jarvis
    - model: hey_mycroft
      id: hey_mycroft
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  vad:
    probability_cutoff: 0.05
  on_wake_word_detected:
    # Если слово-активатор распознается при отключенном звуке (возможно при использовании программного переключателя отключения звука): не предпринимать никаких действий
    - if:
        condition:
          switch.is_off: mic_mute_switch
        then:
          - script.execute:
              id: send_wake_word_event
              wake_word: !lambda return wake_word;
          # Если звучит таймер: остановите его, не запускайте голосовой помощник (таймер можно остановить с помощью голоса!)
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              # Остановить голосовой помощник, если он запущен
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                   # Отключить все остальные уведомления медиаплеера
                    else:
                      - if:
                          condition:
                            media_player.is_announcing:
                              id: external_media_player
                          then:
                            - media_player.stop:
                                announcement: true
                                id: external_media_player
                          # Запустить голосовой помощник и воспроизвести сигнал пробуждения, если эта функция включена
                          else:
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: "wake_word_triggered_sound"
                                  - delay: 300ms
                            - voice_assistant.start:
                                wake_word: !lambda return wake_word;

select:
  - platform: template
    name: "Wake word sensitivity"
    id: wake_word_sensitivity
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      # Задает вероятности распознавания конкретных слов-активаторов, рассчитанные для каждой отдельной модели;
      # Примечание: пороговые значения вероятности задаются в виде квантованного значения uint8, в каждом комментарии указано соответствующее пороговое значение с плавающей запятой;
      # Значения «False Accepts per Hour» проверяются на всех устройствах и каналах из корпуса «Dinner Party».
      # Эти пороговые значения применяются только к конкретным моделям, включенным в прошивку: okay_nabu@20241226.3, hey_jarvis@v2, hey_mycroft@v2



      lambda: |-
        if (x == "Slightly sensitive") {
          id(okay_nabu).set_probability_cutoff(217);    // 0.85 -> 0.000 FAPH on DipCo (Manifest's default)
          id(hey_jarvis).set_probability_cutoff(247);   // 0.97 -> 0.563 FAPH on DipCo (Manifest's default)
          id(hey_mycroft).set_probability_cutoff(253);  // 0.99 -> 0.567 FAPH on DipCo
        } else if (x == "Moderately sensitive") {
          id(okay_nabu).set_probability_cutoff(176);    // 0.69 -> 0.376 FAPH on DipCo
          id(hey_jarvis).set_probability_cutoff(235);   // 0.92 -> 0.939 FAPH on DipCo
          id(hey_mycroft).set_probability_cutoff(242);  // 0.95 -> 1.502 FAPH on DipCo (Manifest's default)
        } else if (x == "Very sensitive") {
          id(okay_nabu).set_probability_cutoff(143);    // 0.56 -> 0.751 FAPH on DipCo
          id(hey_jarvis).set_probability_cutoff(212);   // 0.83 -> 1.502 FAPH on DipCo
          id(hey_mycroft).set_probability_cutoff(237);  // 0.93 -> 1.878 FAPH on DipCo
        }
  - platform: logger
    id: logger_select
    name: Logger Level
    disabled_by_default: true
  - platform: template
    optimistic: true
    name: "Alarm action"
    id: alarm_action
    icon: mdi:bell-plus
    options:
      - "Play sound"
      - "Send event"
      - "Sound and event"
    initial_option: "Play sound"
    on_value:
      then:
        - lambda: |-
            id(saved_alarm_action) = x;

voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 0
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - if:
        condition:
          - lambda: return id(init_in_progress);
          - switch.is_on: mic_mute_switch
        then:
          - switch.turn_off: mic_mute_switch
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    # Устанавливайте флаг ошибки только в том случае, если код ошибки отличается от duplicate_wake_up_detected или stt-no-text-recognized
    # Эти два кода игнорируются для обеспечения более удобного взаимодействия с пользователем
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    # Если код ошибки — cloud-auth-failed, воспроизведите локальный аудиофайл с инструкциями для пользователя.
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "error_cloud_expired"
  # При запуске голосового помощника: воспроизвести сигнал пробуждения, приглушить звук.
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20  # На сколько дБ тише; более высокое значение означает большую тишину, 0 означает полную громкость
        duration: 0.0s  # Продолжительность перехода (по умолчанию переход отсутствует)
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          # Непустая переменная x означает, что в медиаплеер был отправлен URL-адрес потокового TTS
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Запустить скрипт, который, при необходимости, включит функцию «stop word», если ответ будет длиться дольше секунды
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          # Триггер intent_progress не запустил TTS-ответ
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Запустить скрипт, который, при необходимости, включит функцию «stop word», если ответ будет длиться дольше секунды
          - script.execute: activate_stop_word_once
  on_tts_end:
    - script.execute:
        id: send_tts_uri_event
        tts_uri: !lambda 'return x;'
  on_stt_end:
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda 'return x;'
    
  # Когда голосовой помощник завершит работу...
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    # Хватит уклоняться от прослушивания аудио.
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    # Если завершение произошло из-за ошибки, дайте ошибке проявиться в течение секунды
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    # Сбросить идентификатор фазы голосового помощника и сбросить анимацию светодиодов.
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - lambda: |
        id(next_timer).publish_state(-1);
        id(next_timer_name).publish_state("-");
  on_timer_started:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_cancelled:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_updated:
    - script.execute: control_leds
    - lambda: |
        id(next_timer).publish_state(id(first_active_timer).seconds_left);
        id(next_timer_name).publish_state(id(first_active_timer).name);
  on_timer_tick:
    - script.execute: control_leds
    - lambda: | 
        int seconds_left = id(first_active_timer).seconds_left;
        if (std::abs(seconds_left) % 5 == 0) {
          id(next_timer).publish_state(seconds_left); 
        }

