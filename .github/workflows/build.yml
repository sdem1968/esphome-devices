name: 🏭 Сборка прошивки ESPHome

on:
  push:
    branches: [ main ]
    paths:
      - 'kola moy.yaml'      # Запуск ТОЛЬКО при изменении device.yaml
  workflow_dispatch:       # И ручной запуск

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Загружаем код
      - name: 📥 Получаем репозиторий
        uses: actions/checkout@v4
      
      # 2. Проверяем, что device.yaml существует
      - name: 🔍 Проверка конфига
        run: |
          if [ ! -f "device.yaml" ]; then
            echo "❌ Ошибка: файл device.yaml не найден!"
            echo "Создайте device.yaml с конфигурацией ESPHome"
            exit 1
          fi
          echo "✅ device.yaml найден"
      
      # 3. Устанавливаем Python
      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 4. Ставим ESPHome
      - name: 📦 Устанавливаем ESPHome
        run: pip install esphome
      
      # 5. Секреты (опционально)
      - name: 🔐 Настраиваем секреты
        run: |
          if grep -q "!secret" "device.yaml"; then
            echo "🔐 Создаю файл secrets.yaml"
            cat > secrets.yaml << 'EOF'
          wifi_ssid: "${{ secrets.WIFI_SSID }}"
          wifi_password: "${{ secrets.WIFI_PASSWORD }}"
          api_encryption_key: "${{ secrets.API_ENCRYPTION_KEY }}"
          ota_password: "${{ secrets.OTA_PASSWORD }}"
          EOF
            echo "✅ Секреты настроены"
          else
            echo "ℹ️ Секреты не требуются"
          fi
      
      # 6. Компилируем
      - name: 🛠️ Компилируем прошивку
        run: esphome compile device.yaml
      
      # 7. Получаем имя устройства
      - name: 🏷️ Определяем имя устройства
        id: get_device
        run: |
          # Извлекаем имя устройства из device.yaml
          NAME=$(grep -m1 "^  name:" device.yaml || grep -m1 "^name:" device.yaml)
          DEVICE_NAME=$(echo "$NAME" | awk -F: '{print $2}' | tr -d ' "')
          
          if [ -z "$DEVICE_NAME" ]; then
            echo "⚠️ Не могу определить имя устройства, использую 'device'"
            DEVICE_NAME="device"
          fi
          
          echo "Имя устройства: $DEVICE_NAME"
          echo "device_name=$DEVICE_NAME" >> $GITHUB_OUTPUT
      
      # 8. Копируем файлы с понятными именами (ИСПРАВЛЕННЫЙ БЛОК)
      - name: 📂 Готовим файлы для скачивания
        run: |
          DEVICE_NAME="${{ steps.get_device.outputs.device_name }}"
          BUILD_DIR=".esphome/build/$DEVICE_NAME/.pioenvs/$DEVICE_NAME"
          
          echo "📁 Копирую файлы прошивки из: $BUILD_DIR"
          
          # Копируем firmware.bin
          if [ -f "$BUILD_DIR/firmware.bin" ]; then
            cp "$BUILD_DIR/firmware.bin" "./firmware.bin"
            echo "✅ firmware.bin скопирован"
          else
            echo "❌ Ошибка: firmware.bin не найден!"
            exit 1
          fi
          
          # Пробуем найти factory.bin (если существует)
          if [ -f "$BUILD_DIR/firmware.factory.bin" ]; then
            cp "$BUILD_DIR/firmware.factory.bin" "./factory.bin"
            echo "✅ factory.bin скопирован"
          else
            echo "⚠️ factory.bin не найден (нормально для ESP32 и некоторых платформ)"
            echo "Создаю информационный файл..."
            echo "# Этот файл не требуется для прошивки" > "./factory.bin"
            echo "# Для OTA-обновления используйте только firmware.bin" >> "./factory.bin"
            echo "# Для прошивки через USB используйте firmware.bin как образ" >> "./factory.bin"
          fi
          
          # Показываем размеры
          echo ""
          echo "📊 Размеры файлов:"
          ls -lh *.bin 2>/dev/null || true
      
      # 9. Создаём README файл
      - name: 📝 Создаём README
        run: |
          DEVICE_NAME="${{ steps.get_device.outputs.device_name }}"
          
          cat > README.txt << EOF
          =========================================
          ПРОШИВКА ESPHome
          =========================================
          
          📋 ИНФОРМАЦИЯ О СБОРКЕ:
          
          Устройство: $DEVICE_NAME
          Дата сборки: $(date "+%Y-%m-%d %H:%M:%S")
          Версия ESPHome: $(esphome version | head -1)
          
          =========================================
          📁 ФАЙЛЫ В АРХИВЕ:
          
          1. firmware.bin
             Назначение: OTA-обновление (по Wi-Fi)
             Как использовать:
               • Устройство должно быть подключено к Wi-Fi
               • Откройте веб-интерфейс (http://IP-адрес-устройства)
               • Перейдите в раздел "Обновление"
               • Загрузите этот файл
          
          2. factory.bin
             Назначение: Первичная прошивка (через USB)
             Как использовать:
               • Подключите ESP к компьютеру через USB-UART адаптер
               • Используйте esptool.py или Flash Download Tool
               • Загрузите файл по адресу 0x0
             
             ПРИМЕЧАНИЕ: Если этот файл содержит текстовое сообщение вместо прошивки,
             значит для вашего устройства (обычно ESP32) используется только firmware.bin
          
          =========================================
          ⚙️ КОНФИГУРАЦИЯ УСТРОЙСТВА:
          
          Платформа: $(grep -m1 "platform:" device.yaml || echo "Не указана")
          Плата: $(grep -m1 "board:" device.yaml | sed 's/.*://' | tr -d ' "')
          
          =========================================
          ❓ ПОМОЩЬ:
          
          • Ошибка при прошивке: проверьте подключение и выбранный порт
          • Устройство не подключается к Wi-Fi: проверьте настройки в device.yaml
          • Нужна новая прошивка: измените device.yaml и запустите сборку заново
          
          =========================================
          EOF
          
          echo "✅ README.txt создан"
          echo ""
          echo "📄 Содержимое README:"
          cat README.txt
      
      # 10. Загружаем в Artifacts
      - name: 📤 Загружаем прошивку с документацией
        uses: actions/upload-artifact@v4
        with:
          name: firmware-package
          path: |
            firmware.bin
            factory.bin
            README.txt
          retention-days: 7
